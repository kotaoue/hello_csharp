name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install .NET MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: |
          for f in $(find . -name "*.csproj" | grep -v '/obj/' | grep -v '/bin/'); do
            dotnet restore "$f"
          done

      - name: Build (non-MAUI projects)
        run: |
          dotnet build helloworld/helloworld.csproj
          dotnet build hello_aspnet/aspnetcore.csproj

      - name: Build (MAUI - Android)
        run: dotnet build hello_maui/hello_maui.csproj -f net10.0-android
